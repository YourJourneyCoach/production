<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Your Journey Coach</title>
    <meta name="description"
        content="Insights on leadership, enneagram, and navigating transitions from Your Journey Coach.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css?v=6">
    <link rel="stylesheet" href="css/style.css?v=6">
    <link rel="stylesheet" href="css/responsive.css?v=6">

    <!-- Marked JS for parsing Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
        .blog-header {
            padding-top: 150px;
            padding-bottom: 50px;
            text-align: center;
            background-color: var(--color-bg-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            padding: 3rem 0;
        }

        .blog-card {
            background: var(--color-bg-secondary);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            padding: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border-color: var(--color-accent-gold-dim);
        }

        .blog-date {
            font-size: 0.85rem;
            color: var(--color-accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            display: block;
        }

        .blog-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--color-text-primary);
        }

        .blog-card p {
            color: var(--color-text-secondary);
            font-size: 1rem;
            flex-grow: 1;
            margin-bottom: 1.5rem;
        }

        .read-more {
            color: var(--color-accent-gold);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            align-self: flex-start;
        }

        /* Single Post Styles */
        #single-post-view {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 1rem;
            display: none;
        }

        .back-link {
            color: var(--color-accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--color-text-primary);
        }

        .post-header {
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 2rem;
        }

        .post-title {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .post-meta {
            color: var(--color-text-muted);
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .post-content {
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--color-text-secondary);
        }

        .post-content h2,
        .post-content h3 {
            color: var(--color-text-primary);
            margin-top: 2.5rem;
            margin-bottom: 1rem;
        }

        .post-content p {
            margin-bottom: 1.5rem;
        }

        .post-content ul,
        .post-content ol {
            margin-bottom: 1.5rem;
            padding-left: 2rem;
        }

        .post-content li {
            margin-bottom: 0.5rem;
        }

        .post-content blockquote {
            border-left: 4px solid var(--color-accent-gold);
            padding-left: 1.5rem;
            margin-left: 0;
            margin-right: 0;
            font-style: italic;
            color: var(--color-text-primary);
        }

        .post-content img {
            max-width: 100%;
            border-radius: 4px;
            margin: 2rem 0;
        }
    </style>
</head>

<body>
    <!-- Page Loader -->
    <div class="loader-wrapper">
        <div class="breathing-circle"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar" style="background: rgba(10, 14, 20, 0.95); box-shadow: 0 5px 20px rgba(0,0,0,0.05);">
        <div class="container">
            <a href="index.html" class="logo" id="nav-logo">Your Journey Coach</a>
            <ul class="nav-links" id="nav-links-list">
                <!-- Populated dynamically by js/nav.js from data/nav.json -->
            </ul>
        </div>
    </nav>

    <main>
        <!-- Blog List View -->
        <div id="blog-list-view">
            <section class="blog-header">
                <div class="container">
                    <span class="eyebrow reveal-text">INSIGHTS</span>
                    <h1 class="reveal-text delay-100">The Journey Blog</h1>
                    <p class="reveal-text delay-200"
                        style="color: var(--color-text-secondary); max-width: 600px; margin: 1rem auto 0 auto;">
                        Thoughts on leadership, self-awareness, and navigating the complexities of organizational life.
                    </p>
                </div>
            </section>

            <section class="container" style="min-height: 400px;">
                <div id="blog-grid" class="blog-grid fade-in-scroll">
                    <!-- Blog cards will be injected here via JavaScript -->
                    <p style="text-align: center; width: 100%; grid-column: 1 / -1; color: var(--color-text-muted);">
                        Loading posts...</p>
                </div>
            </section>
        </div>

        <!-- Single Post View -->
        <div id="single-post-view">
            <a href="blog.html" class="back-link" id="back-to-blog">
                <svg viewBox="0 0 24 24" style="width: 16px; height: 16px; fill: currentColor;">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
                </svg>
                Back to all posts
            </a>

            <div class="post-header fade-in-up">
                <h1 class="post-title" id="post-title">Loading...</h1>
                <div class="post-meta">
                    <span id="post-date"></span> &nbsp;|&nbsp; By <span id="post-author">John Paine</span>
                </div>
            </div>

            <div class="post-content fade-in-up delay-1" id="post-content">
                <!-- Markdown content will be injected here -->
            </div>
        </div>
    </main>

    <footer
        style="padding: 3rem 0; background: var(--color-bg-primary); border-top: 1px solid rgba(255,255,255,0.05); margin-top: 4rem;">
        <div class="container" style="display: flex; flex-direction: column; align-items: center; gap: 2.5rem;">
            <p style="color: var(--color-text-muted); font-size: 0.9rem;">&copy; 2026 Your Journey Coach. All Rights
                Reserved.</p>
        </div>
    </footer>

    <script src="js/nav.js"></script>
    <script src="js/main.js"></script>
    <script src="js/blog.js"></script>
</body>

</html>
