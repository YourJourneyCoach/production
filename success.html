<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Your Journey Coach</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        .success-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background: var(--color-bg-primary);
            padding: 2rem;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .success-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.1) 0%, transparent 50%);
            z-index: -1;
        }

        .success-box {
            background: var(--color-bg-secondary);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 4rem 3rem;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(212, 175, 55, 0.1);
            color: var(--color-accent-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem auto;
            border: 2px solid var(--color-accent-gold);
        }

        .success-icon svg {
            width: 40px;
            height: 40px;
            fill: currentColor;
        }

        .success-title {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 1rem;
        }

        .success-text {
            color: var(--color-text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }
    </style>
</head>

<body>
    <div class="success-wrapper">
        <div class="success-box">
            <div class="success-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" />
                </svg>
            </div>
            <h1 class="success-title">Message Received</h1>
            <p class="success-text">Thank you for reaching out! Your message has been securely sent. I will review it
                and get back to you shortly.</p>
            <a href="index.html" class="btn-primary">Return to Homepage</a>
        </div>
    </div>
</body>

</html>
