<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools & Resources | Your Journey Coach</title>
    <meta name="description"
        content="Downloadable tools, PDFs, and external resources for executive coaching and Enneagram exploration.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css?v=7">
    <link rel="stylesheet" href="css/style.css?v=7">
    <link rel="stylesheet" href="css/responsive.css?v=7">

    <style>
        .tools-header {
            padding-top: 150px;
            padding-bottom: 50px;
            text-align: center;
            background-color: var(--color-bg-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .category-section {
            margin-top: 4rem;
            margin-bottom: 2rem;
        }

        .category-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--color-accent-gold);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.5rem;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .tool-card {
            background: var(--color-bg-secondary);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            padding: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
            text-decoration: none;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border-color: var(--color-accent-gold-dim);
        }

        .tool-type-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            display: inline-block;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--color-text-primary);
        }

        .tool-type-badge.pdf {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .tool-type-badge.link {
            background: rgba(199, 169, 107, 0.15);
            /* Gold tint */
            color: var(--color-accent-gold);
        }

        .tool-card h3 {
            font-size: 1.35rem;
            margin-bottom: 1rem;
            color: var(--color-text-primary);
        }

        .tool-card p {
            color: var(--color-text-secondary);
            font-size: 0.95rem;
            flex-grow: 1;
            margin-bottom: 1.5rem;
        }

        .tool-action {
            color: var(--color-accent-gold);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-action svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
    </style>
</head>

<body>
    <!-- Page Loader -->
    <div class="loader-wrapper">
        <div class="breathing-circle"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar" style="background: rgba(10, 14, 20, 0.95); box-shadow: 0 5px 20px rgba(0,0,0,0.05);">
        <div class="container">
            <a href="index.html" class="logo" id="nav-logo">Your Journey Coach</a>
            <ul class="nav-links" id="nav-links-list">
                <!-- Populated dynamically by js/nav.js from data/nav.json -->
            </ul>
        </div>
    </nav>

    <main>
        <!-- Header -->
        <section class="tools-header">
            <div class="container">
                <span class="eyebrow reveal-text">RESOURCES</span>
                <h1 class="reveal-text delay-100">Tools for the Journey</h1>
                <p class="reveal-text delay-200"
                    style="color: var(--color-text-secondary); max-width: 600px; margin: 1rem auto 0 auto;">
                    Explore curated worksheets, guides, and recommended readings to support your continuous growth.
                </p>
            </div>
        </section>

        <!-- Tools Grid Area -->
        <section class="container" style="min-height: 400px; padding-bottom: 6rem;">
            <div id="tools-container">
                <p style="text-align: center; margin-top: 4rem; color: var(--color-text-muted);">
                    Loading resources...
                </p>
            </div>
        </section>
    </main>

    <footer
        style="padding: 3rem 0; background: var(--color-bg-primary); border-top: 1px solid rgba(255,255,255,0.05); margin-top: 4rem;">
        <div class="container" style="display: flex; flex-direction: column; align-items: center; gap: 2.5rem;">
            <p style="color: var(--color-text-muted); font-size: 0.9rem;">&copy; 2026 Your Journey Coach. All Rights
                Reserved.</p>
        </div>
    </footer>

    <script src="js/nav.js"></script>
    <script src="js/main.js"></script>
    <script src="js/tools.js"></script>
</body>

</html>
